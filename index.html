<!DOCTYPE html>
<html>
<head>
  <title>Horus</title>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(135deg, #0b1c2c, #07121c);
      height: 100vh;
      color: white;
    }

    .login {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .card {
      background: rgba(255,255,255,0.05);
      padding: 40px;
      border-radius: 16px;
      text-align: center;
      width: 300px;
      box-shadow: 0 0 30px rgba(0,0,0,0.5);
    }

    input {
      width: 100%;
      padding: 12px;
      margin: 8px 0;
      border-radius: 8px;
      border: none;
    }

    button {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      border-radius: 8px;
      border: none;
      background: #00c3ff;
      cursor: pointer;
      font-weight: bold;
    }

    .secondary {
      background: transparent;
      border: 1px solid #00c3ff;
      color: white;
    }
  </style>
</head>

<body>

<div class="login">
  <div class="card">
    <h1>HORUS</h1>
    <p>THE ALL-SEEING ONE</p>

    <input id="email" placeholder="Email">
    <input id="password" type="password" placeholder="Senha">

    <button id="loginBtn">Entrar</button>
    <button id="registerBtn" class="secondary">Criar conta</button>
    <button onclick="adminLogin()">Admin</button>
  </div>
</div>

<script>
  const firebaseConfig = {
    apiKey: "AIzaSyDs1wyLdmz4_2DSt8FXSw-apIeEi0kwzZ4",
    authDomain: "horus-bf93b.firebaseapp.com",
    projectId: "horus-bf93b",
    storageBucket: "horus-bf93b.firebasestorage.app",
    messagingSenderId: "587109575045",
    appId: "1:587109575045:web:0fc32f109aa24399e07cec"
  };

  firebase.initializeApp(firebaseConfig);

  const auth = firebase.auth();
  const db = firebase.firestore();

  // LOGIN
  document.getElementById("loginBtn").onclick = function() {
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;

    auth.signInWithEmailAndPassword(email, password)
      .then(() => {
        document.body.innerHTML = `
          <iframe 
            src="https://app.fabric.microsoft.com/reportEmbed?reportId=d4af722f-cdb8-4954-95c6-5867748d6ea7&autoAuth=true&ctid=e524f1b1-495d-41da-8e4c-f35459e1e52d"
            style="position:fixed; top:0; left:0; width:100%; height:100%; border:none;">
          </iframe>
        `;
      })
      .catch((error) => {
        alert("Erro no login: " + error.message);
      });
  };

  // CRIAR CONTA
  document.getElementById("registerBtn").onclick = function() {
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;

    db.collection("pedidos").add({
      email: email,
      password: password,
      status: "pendente"
    })
    .then(() => {
      alert("Pedido enviado! Aguarde aprovação.");
    })
    .catch((error) => {
      alert("Erro: " + error.message);
    });
  };

  // ADMIN LOGIN
  function adminLogin() {
    const senha = prompt("Digite a senha de admin:");

    if (senha === "1234") {
      abrirPainel();
    } else {
      alert("Senha errada");
    }
  }

  // PAINEL BONITO
  function abrirPainel() {
    db.collection("pedidos").get().then((snapshot) => {

      let html = `
        <div style="
          background:#0b1c2c;
          min-height:100vh;
          padding:30px;
          color:white;
          font-family:Arial;
        ">
        
        <h1 style="text-align:center;">Painel Horus 👁️</h1>

        <div style="
          max-width:800px;
          margin:auto;
        ">
      `;

      snapshot.forEach((doc) => {
        const data = doc.data();

        let cor = data.status === "aprovado" ? "#00ff88" : "#ffaa00";

        html += `
          <div style="
            background:#111;
            padding:15px;
            margin:10px 0;
            border-radius:10px;
            display:flex;
            justify-content:space-between;
            align-items:center;
          ">
            <div>
              <p><strong>${data.email}</strong></p>
              <p style="color:${cor};">Status: ${data.status}</p>
            </div>

            <button onclick="aprovar('${doc.id}', '${data.email}', '${data.password}')"
              style="
                background:#00c3ff;
                border:none;
                padding:10px;
                border-radius:8px;
                cursor:pointer;
              ">
              Aprovar
            </button>
          </div>
        `;
      });

      html += `</div></div>`;

      document.body.innerHTML = html;
    });
  }

  // APROVAR USUÁRIO
  function aprovar(id, email, password) {
    auth.createUserWithEmailAndPassword(email, password)
      .then(() => {

        db.collection("pedidos").doc(id).update({
          status: "aprovado"
        });

        alert("Usuário aprovado!");
        abrirPainel();

      })
      .catch((error) => {
        alert(error.message);
      });
  }
</script>

</body>
</html>
