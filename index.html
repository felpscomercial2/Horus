<!DOCTYPE html>
<html>
<head>
  <title>Horus</title>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(135deg, #0b1c2c, #07121c);
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      color: white;
    }

    .card {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(15px);
      padding: 40px;
      border-radius: 16px;
      text-align: center;
      width: 300px;
    }

    input {
      width: 100%;
      padding: 12px;
      margin: 8px 0;
      border-radius: 8px;
      border: none;
    }

    button {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      border-radius: 8px;
      border: none;
      background: #00c3ff;
      cursor: pointer;
    }

    .secondary {
      background: transparent;
      border: 1px solid #00c3ff;
      color: white;
    }
  </style>
</head>

<body>

<div class="card">
  <h1>HORUS</h1>
  <p>THE ALL-SEEING ONE</p>

  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Senha">

  <button onclick="login()">Entrar</button>
  <button class="secondary" onclick="register()">Criar conta</button>
</div>

<script>
  let auth;
  let db;

  window.onload = function() {

    const firebaseConfig = {
      apiKey: "AIzaSyDs1wyLdmz4_2DSt8FXSw-apIeEi0kwzZ4",
      authDomain: "horus-bf93b.firebaseapp.com",
    };

    firebase.initializeApp(firebaseConfig);

    auth = firebase.auth();
    db = firebase.firestore();
  };

  function login() {
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;

    auth.signInWithEmailAndPassword(email, password)
      .then(() => {
        document.body.innerHTML = `
          <iframe 
            src="https://app.fabric.microsoft.com/reportEmbed?reportId=d4af722f-cdb8-4954-95c6-5867748d6ea7&autoAuth=true&ctid=e524f1b1-495d-41da-8e4c-f35459e1e52d"
            style="position:fixed; top:0; left:0; width:100%; height:100%; border:none;">
          </iframe>
        `;
      })
      .catch((error) => {
        alert("Erro no login: " + error.message);
      });
  }

  function register() {
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;

    db.collection("pedidos").add({
      email: email,
      password: password,
      status: "pendente"
    })
    .then(() => {
      alert("Pedido enviado! Aguarde aprovação.");
    })
    .catch((error) => {
      alert("Erro: " + error.message);
    });
  }
</script>

</body>
</html>
